version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fenix_app
    volumes:
      - ./fenix-api:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: fenix_postgres
    restart: always
    environment:
      POSTGRES_DB: fenix
      POSTGRES_USER: fenix
      POSTGRES_PASSWORD: fenix
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    container_name: fenix_redis
    ports:
      - "6379:6379"
