openapi: 3.0.3
info:
  title: Fenix API
  version: 1.0.0
  description: >
    Documentação da API de exames, questões, tentativas e estatísticas.
    A API usa autenticação JWT via Bearer Token.

servers:
  - url: http://localhost:8000/api
    description: Servidor de Desenvolvimento Local

tags:
  - name: Exams
    description: Criação, leitura, atualização e remoção de provas
  - name: Questions
    description: Criação de questões isoladas com alternativas
  - name: Attempts
    description: Envio de respostas e correção automática
  - name: Dashboard
    description: Estatísticas globais e por prova
  - name: Debug
    description: Endpoints de apoio para inspeção interna

security:
  - bearerAuth: []

paths:
  /questions:
    post:
      tags:
        - Questions
      summary: Cria uma questão vinculada a uma prova existente
      description: >
        Cria a questão, cria as alternativas associadas e retorna a questão criada
        já carregada com suas opções.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionCreateRequest"
      responses:
        "200":
          description: Questão criada com suas alternativas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionWithAnswers"
        "422":
          $ref: "#/components/responses/ValidationError"

  /exams:
    get:
      tags:
        - Exams
      summary: Lista todas as provas
      description: >
        Retorna todas as provas com suas questões e alternativas.
        Se student_id for enviado, cada prova recebe o campo has_attempt indicando
        se o estudante informado já realizou aquela prova.
      parameters:
        - name: student_id
          in: query
          required: false
          description: ID do estudante para calcular has_attempt
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Lista de provas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamListItem"
    post:
      tags:
        - Exams
      summary: Cria uma prova com questões e alternativas
      description: >
        Cria a prova e cria em lote suas questões e alternativas.
        O campo created_by é preenchido pelo backend com o usuário atual/configurado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamWriteRequest"
      responses:
        "200":
          description: Prova criada com questões e alternativas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithAnswers"
        "422":
          $ref: "#/components/responses/ValidationError"

  /exams/{id}:
    get:
      tags:
        - Exams
      summary: Exibe uma prova sem revelar as alternativas corretas
      description: >
        Retorna a prova com questões e alternativas, ocultando o campo is_correct.
        Se student_id for informado, adiciona has_attempt e last_result com base
        na última tentativa desse estudante para a prova.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - name: student_id
          in: query
          required: false
          description: ID do estudante para recuperar a última tentativa
          schema:
            type: integer
            example: 123
      responses:
        "200":
          description: Prova encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamPublic"
        "404":
          description: Prova não encontrada
    put:
      tags:
        - Exams
      summary: Atualiza uma prova e recria suas questões e alternativas
      description: >
        Atualiza título e descrição da prova. Em seguida, remove as questões e alternativas
        antigas e recria o conjunto enviado no request.
        Regra de negócio: não permitir editar se a prova já tiver tentativas/respostas.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamWriteRequest"
      responses:
        "200":
          description: Prova atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithAnswers"
        "404":
          description: Prova não encontrada
        "409":
          $ref: "#/components/responses/BusinessRuleError"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - Exams
      summary: Remove uma prova e seus registros filhos
      description: >
        Remove as alternativas, as questões e a prova.
        Regra de negócio: não permitir excluir se a prova já tiver tentativas/respostas.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prova removida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessageResponse"
        "404":
          description: Prova não encontrada
        "409":
          $ref: "#/components/responses/BusinessRuleError"

  /exams/{id}/edit:
    get:
      tags:
        - Exams
      summary: Exibe a prova com as alternativas corretas visíveis
      description: Endpoint usado para telas administrativas de edição/revisão da prova.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prova encontrada com is_correct em cada alternativa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithAnswers"
        "404":
          description: Prova não encontrada

  /exams/{examId}/submit:
    post:
      tags:
        - Attempts
      summary: Envia as respostas de uma prova
      description: >
        Registra uma tentativa única por aluno e prova, corrige automaticamente as respostas,
        grava os registros de Answer e retorna o resumo da correção.
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttemptSubmitRequest"
      responses:
        "200":
          description: Tentativa processada com sucesso
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - data
                properties:
                  message:
                    type: string
                    example: Prova enviada com sucesso
                  data:
                    $ref: "#/components/schemas/AttemptResult"
        "400":
          description: Erro de regra de negócio ou exceção tratada no controller
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: Você já realizou essa prova.
        "422":
          $ref: "#/components/responses/ValidationError"

  /dashboard:
    get:
      tags:
        - Dashboard
      summary: Retorna estatísticas globais
      description: >
        Retorna o total de tentativas, média geral, maior/menor nota e o ranking de alunos.
        Os parâmetros page e limit são usados para paginar o ranking retornado.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
            example: 10
      responses:
        "200":
          description: Estatísticas globais
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalDashboardStats"

  /dashboard/student:
  get:
    tags:
      - Dashboard
    summary: Estatísticas do dashboard do aluno
    description: Retorna média do aluno e quantidade de provas pendentes
    parameters:
      - name: student_id
        in: query
        required: true
        schema:
          type: integer
        example: 1
    responses:
      "200":
        description: Dados do dashboard do aluno
        content:
          application/json:
            schema:
              type: object
              properties:
                average_score:
                  type: number
                  format: float
                  example: 8.5
                pending_exams:
                  type: integer
                  example: 2

  /exams/{examId}/stats:
    get:
      tags:
        - Dashboard
      summary: Retorna estatísticas de uma prova específica
      description: >
        Valida se a prova existe e depois retorna estatísticas agregadas somente das tentativas
        relacionadas a essa prova.
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Estatísticas da prova
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamStats"
        "404":
          description: Prova não encontrada

  /debug:
    get:
      tags:
        - Debug
      summary: Retorna questões e alternativas em modo debug
      description: Endpoint de inspeção interna para verificar os registros brutos.
      responses:
        "200":
          description: Dados brutos de questões e alternativas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugDump"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: Erro de validação nos campos enviados
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"
    BusinessRuleError:
      description: Violação de regra de negócio
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                example: Não é possível editar ou excluir esta prova porque ela já possui respostas.

  schemas:
    ValidationError:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          description: Lista de erros por campo
          additionalProperties:
            type: array
            items:
              type: string
          example:
            student_id:
              - O campo student id é obrigatório.
            answers:
              - É necessário enviar ao menos uma resposta.

    GenericMessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Operação realizada com sucesso

    OptionPublic:
      type: object
      required:
        - id
        - question_id
        - text
      properties:
        id:
          type: integer
          example: 1
        question_id:
          type: integer
          example: 10
        text:
          type: string
          example: Alternativa A

    OptionWithCorrect:
      type: object
      required:
        - id
        - question_id
        - text
        - is_correct
      properties:
        id:
          type: integer
          example: 1
        question_id:
          type: integer
          example: 10
        text:
          type: string
          example: Alternativa A
        is_correct:
          type: boolean
          example: true

    QuestionPublic:
      type: object
      required:
        - id
        - exam_id
        - statement
        - options
      properties:
        id:
          type: integer
          example: 10
        exam_id:
          type: integer
          example: 1
        statement:
          type: string
          example: Quanto é 2 + 2?
        options:
          type: array
          items:
            $ref: "#/components/schemas/OptionPublic"

    QuestionWithAnswers:
      type: object
      required:
        - id
        - exam_id
        - statement
        - options
      properties:
        id:
          type: integer
          example: 10
        exam_id:
          type: integer
          example: 1
        statement:
          type: string
          example: Quanto é 2 + 2?
        options:
          type: array
          items:
            $ref: "#/components/schemas/OptionWithCorrect"

    QuestionCreateRequest:
      type: object
      required:
        - exam_id
        - statement
        - options
      properties:
        exam_id:
          type: integer
          description: ID da prova pai
          example: 1
        statement:
          type: string
          description: Enunciado da questão
          example: Quanto é 2 + 2?
        options:
          type: array
          minItems: 2
          items:
            type: object
            required:
              - text
              - is_correct
            properties:
              text:
                type: string
                example: 4
              is_correct:
                type: boolean
                example: true
      example:
        exam_id: 1
        statement: Qual a capital do Brasil?
        options:
          - text: Rio de Janeiro
            is_correct: false
          - text: Brasília
            is_correct: true

    ExamWriteRequest:
      type: object
      required:
        - title
        - questions
      properties:
        title:
          type: string
          example: Exame de Matemática
        description:
          type: string
          nullable: true
          example: Prova com questões básicas
        questions:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - statement
              - options
            properties:
              statement:
                type: string
                example: Quanto é 2 + 2?
              options:
                type: array
                minItems: 2
                items:
                  type: object
                  required:
                    - text
                    - is_correct
                  properties:
                    text:
                      type: string
                      example: 4
                    is_correct:
                      type: boolean
                      example: true
      example:
        title: Exame de Matemática
        description: Prova com questões básicas
        questions:
          - statement: Quanto é 2 + 2?
            options:
              - text: 4
                is_correct: true
              - text: 5
                is_correct: false

    ExamPublic:
      type: object
      required:
        - id
        - title
        - created_by
        - questions
        - has_attempt
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Exame de Matemática
        description:
          type: string
          nullable: true
          example: Prova com questões básicas
        created_by:
          type: integer
          example: 1
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionPublic"
        has_attempt:
          type: boolean
          example: false
        last_result:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/AttemptResult"
            - type: "null"

    ExamWithAnswers:
      type: object
      required:
        - id
        - title
        - created_by
        - questions
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Exame de Matemática
        description:
          type: string
          nullable: true
          example: Prova com questões básicas
        created_by:
          type: integer
          example: 1
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionWithAnswers"

    ExamListItem:
      type: object
      required:
        - id
        - title
        - created_by
        - questions
        - has_attempt
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Exame de Matemática
        description:
          type: string
          nullable: true
          example: Prova com questões básicas
        created_by:
          type: integer
          example: 1
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionPublic"
        has_attempt:
          type: boolean
          example: false

    AttemptAnswerInput:
      type: object
      required:
        - question_id
        - selected_option_id
      properties:
        question_id:
          type: integer
          example: 10
        selected_option_id:
          type: integer
          example: 1

    AttemptSubmitRequest:
      type: object
      required:
        - student_id
        - answers
      properties:
        student_id:
          type: integer
          example: 123
        answers:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/AttemptAnswerInput"
      example:
        student_id: 123
        answers:
          - question_id: 10
            selected_option_id: 1
          - question_id: 11
            selected_option_id: 4

    AttemptDetail:
      type: object
      required:
        - question_id
        - is_correct
      properties:
        question_id:
          type: integer
          example: 10
        question_statement:
          type: string
          example: Quanto é 2 + 2?
        selected_option_id:
          type: integer
          nullable: true
          example: 1
        selected_text:
          type: string
          nullable: true
          example: 4
        correct_option_id:
          type: integer
          nullable: true
          example: 1
        correct_text:
          type: string
          nullable: true
          example: 4
        is_correct:
          type: boolean
          example: true

    AttemptResult:
      type: object
      required:
        - attempt_id
        - exam_id
        - student_id
        - score
        - percentage
        - total_questions
        - correct_count
        - wrong_count
        - details
      properties:
        attempt_id:
          type: integer
          example: 50
        exam_id:
          type: integer
          example: 1
        student_id:
          type: integer
          example: 123
        score:
          type: integer
          description: Quantidade de respostas corretas
          example: 8
        percentage:
          type: integer
          description: Nota percentual de 0 a 100
          example: 80
        total_questions:
          type: integer
          example: 10
        correct_count:
          type: integer
          example: 8
        wrong_count:
          type: integer
          example: 2
        details:
          type: array
          items:
            $ref: "#/components/schemas/AttemptDetail"

    DashboardRankingItem:
      type: object
      required:
        - position
        - student_id
        - score
        - percentage
      properties:
        position:
          type: integer
          example: 1
        student_id:
          type: integer
          example: 123
        score:
          type: number
          format: float
          example: 8.5
        percentage:
          type: number
          format: float
          example: 85
        attempts_count:
          type: integer
          description: Quantidade de tentativas consideradas no ranking global
          example: 3

    GlobalDashboardStats:
      type: object
      required:
        - total_attempts
        - average_score
        - average_percentage
        - highest_score
        - lowest_score
        - ranking
      properties:
        total_attempts:
          type: integer
          example: 150
        average_score:
          type: number
          format: float
          example: 7.5
        average_percentage:
          type: number
          format: float
          example: 75
        highest_score:
          type: number
          format: float
          example: 10
        lowest_score:
          type: number
          format: float
          example: 0
        ranking:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRankingItem"

    ExamStatsRankingItem:
      type: object
      required:
        - position
        - student_id
        - score
        - percentage
      properties:
        position:
          type: integer
          example: 1
        student_id:
          type: integer
          example: 123
        score:
          type: number
          format: float
          example: 8
        percentage:
          type: number
          format: float
          example: 80

    ExamStats:
      type: object
      required:
        - total_attempts
        - average_score
        - average_percentage
        - highest_score
        - lowest_score
        - ranking
      properties:
        total_attempts:
          type: integer
          example: 20
        average_score:
          type: number
          format: float
          example: 7.2
        average_percentage:
          type: number
          format: float
          example: 72
        highest_score:
          type: number
          format: float
          example: 10
        lowest_score:
          type: number
          format: float
          example: 0
        ranking:
          type: array
          items:
            $ref: "#/components/schemas/ExamStatsRankingItem"

    DebugDump:
      type: object
      properties:
        questions:
          type: array
          items:
            type: object
            additionalProperties: true
        options:
          type: array
          items:
            type: object
            additionalProperties: true
